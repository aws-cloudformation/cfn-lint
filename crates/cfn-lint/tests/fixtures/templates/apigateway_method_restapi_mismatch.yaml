AWSTemplateFormatVersion: '2010-09-09'
Resources:
  RestApi1:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: Api1

  RestApi2:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: Api2

  Authorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: MyAuthorizer
      RestApiId: !Ref RestApi1
      Type: TOKEN
      AuthorizerUri: arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-1:123456789012:function:auth/invocations

  MethodMismatchedRestApi:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: GET
      ResourceId: !GetAtt RestApi2.RootResourceId
      RestApiId: !Ref RestApi2
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref Authorizer
