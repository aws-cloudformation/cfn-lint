AWSTemplateFormatVersion: '2010-09-09'
Resources:
  # E3685: Image package type with Handler (not allowed)
  ImageFunctionWithHandler:
    Type: AWS::Lambda::Function
    Properties:
      PackageType: Image
      Role: arn:aws:iam::123456789012:role/lambda-role
      Handler: index.handler
      Code:
        ImageUri: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest

  # E3685: Image package type with Runtime (not allowed)
  ImageFunctionWithRuntime:
    Type: AWS::Lambda::Function
    Properties:
      PackageType: Image
      Role: arn:aws:iam::123456789012:role/lambda-role
      Runtime: python3.12
      Code:
        ImageUri: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest

  # E3696: LogFormat Text with SystemLogLevel (not allowed)
  FunctionTextLogWithLevel:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: text-log-function
      Runtime: python3.12
      Role: arn:aws:iam::123456789012:role/lambda-role
      Handler: index.handler
      Code:
        ZipFile: |
          def handler(event, context):
            return "Hello"
      LoggingConfig:
        LogFormat: Text
        SystemLogLevel: WARN
