AWSTemplateFormatVersion: '2010-09-09'
Resources:
  # Valid: LogFormat Text without LogLevel
  ValidTextLogging:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: valid-text-logging
      Role: arn:aws:iam::123456789012:role/lambda-role
      Code:
        ZipFile: |
          def handler(event, context):
              return 'Hello'
      Handler: index.handler
      Runtime: python3.14
      LoggingConfig:
        LogFormat: Text
  
  # Valid: LogFormat JSON with LogLevel
  ValidJSONLogging:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: valid-json-logging
      Role: arn:aws:iam::123456789012:role/lambda-role
      Code:
        ZipFile: |
          def handler(event, context):
              return 'Hello'
      Handler: index.handler
      Runtime: python3.14
      LoggingConfig:
        LogFormat: JSON
        SystemLogLevel: INFO
  
  # Valid: Container image without Handler/Runtime/Layers
  ValidContainerImage:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: valid-container
      Role: arn:aws:iam::123456789012:role/lambda-role
      PackageType: Image
      Code:
        ImageUri: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-func:latest
