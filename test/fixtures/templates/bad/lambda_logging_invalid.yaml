AWSTemplateFormatVersion: '2010-09-09'
Resources:
  # Invalid: LogLevel with Text format
  InvalidTextWithLogLevel:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: invalid-text-loglevel
      Role: arn:aws:iam::123456789012:role/lambda-role
      Code:
        ZipFile: |
          def handler(event, context):
              return 'Hello'
      Handler: index.handler
      Runtime: python3.14
      LoggingConfig:
        LogFormat: Text
        SystemLogLevel: INFO  # Should cause error
  
  # Invalid: Handler with container image
  InvalidContainerWithHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: invalid-container-handler
      Role: arn:aws:iam::123456789012:role/lambda-role
      PackageType: Image
      Code:
        ImageUri: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-func:latest
      Handler: index.handler  # Should cause error
  
  # Invalid: Runtime with container image
  InvalidContainerWithRuntime:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: invalid-container-runtime
      Role: arn:aws:iam::123456789012:role/lambda-role
      PackageType: Image
      Code:
        ImageUri: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-func:latest
      Runtime: python3.14  # Should cause error
  
  # Invalid: Layers with container image
  InvalidContainerWithLayers:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: invalid-container-layers
      Role: arn:aws:iam::123456789012:role/lambda-role
      PackageType: Image
      Code:
        ImageUri: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-func:latest
      Layers:  # Should cause error
        - arn:aws:lambda:us-east-1:123456789012:layer:my-layer:1
