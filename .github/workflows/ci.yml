name: CI

on:
  push:
    branches: [v2]
  pull_request:
    branches: [v2]

# Least privilege by default; grant per-job minimums below (C86).
permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, platform-independent lint gate. Runs once on Linux.
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Download schemas
        shell: bash
        run: |
          curl -sL https://github.com/aws-cloudformation/resource-provider-enhanced-schemas/releases/download/latest/schemas-cfn-lint.zip -o /tmp/schemas.zip
          cd crates/cfn-lint/data/schemas
          unzip -qo /tmp/schemas.zip
          cd providers
          for f in *-*.json; do mv "$f" "$(echo $f | tr '-' '_')" 2>/dev/null; done
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Build + test across the OSes we ship binaries for. Catches platform-specific
  # path/encoding bugs that ubuntu-only testing misses.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Download schemas
        shell: bash
        run: |
          curl -sL https://github.com/aws-cloudformation/resource-provider-enhanced-schemas/releases/download/latest/schemas-cfn-lint.zip -o /tmp/schemas.zip
          cd crates/cfn-lint/data/schemas
          unzip -qo /tmp/schemas.zip
          cd providers
          for f in *-*.json; do mv "$f" "$(echo $f | tr '-' '_')" 2>/dev/null; done
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  # aarch64 is a release target but has no hosted test runner here, so we
  # cross-compile it build-only to catch target-specific compile failures.
  build-aarch64:
    name: build (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build
        # Exclude cfn-lint-py: it is a PyO3 extension module that cannot be
        # plain-cargo cross-compiled without a target Python (PYO3_CROSS_*).
        # The aarch64 wheel is built separately by maturin in the wheels
        # workflow; this job only smoke-tests the core Rust crates.
        run: cargo build --workspace --exclude cfn-lint-py --target aarch64-unknown-linux-gnu

  # Measure test coverage and publish it as an artifact. No enforced floor yet;
  # the baseline is recorded so a floor can be added once it stabilizes.
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Download schemas
        shell: bash
        run: |
          curl -sL https://github.com/aws-cloudformation/resource-provider-enhanced-schemas/releases/download/latest/schemas-cfn-lint.zip -o /tmp/schemas.zip
          cd crates/cfn-lint/data/schemas
          unzip -qo /tmp/schemas.zip
          cd providers
          for f in *-*.json; do mv "$f" "$(echo $f | tr '-' '_')" 2>/dev/null; done
      - name: Generate coverage
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only | tee coverage-summary.txt
      - name: Job summary
        run: |
          {
            echo '### Coverage summary'
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-summary.txt

  parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Download schemas
        run: |
          curl -sL https://github.com/aws-cloudformation/resource-provider-enhanced-schemas/releases/download/latest/schemas-cfn-lint.zip -o /tmp/schemas.zip
          cd crates/cfn-lint/data/schemas
          unzip -qo /tmp/schemas.zip
          cd providers
          for f in *-*.json; do mv "$f" "$(echo $f | tr '-' '_')" 2>/dev/null; done
      # Fixture refs are PINNED and MUST match `fixture_refs` in
      # crates/cfn-lint/tests/parity_ratchet.json so the parity floors stay
      # deterministic. Bump both together when refreshing fixtures.
      - name: Provision Python cfn-lint fixtures
        run: |
          git clone --depth 1 --branch v1.53.1 https://github.com/aws-cloudformation/cfn-lint.git /tmp/pycfnlint
          echo "CFN_LINT_FIXTURES_DIR=/tmp/pycfnlint/test/fixtures" >> "$GITHUB_ENV"
      - name: Provision SAM translator fixtures
        run: |
          git clone --depth 1 --branch v1.100.0 https://github.com/aws/serverless-application-model.git /tmp/sam
          echo "SAM_TRANSLATOR_DIR=/tmp/sam" >> "$GITHUB_ENV"
      # `--include-ignored` runs the fixture-dependent parity tests, which assert
      # against the ratchet floors in parity_ratchet.json. A regression (fewer
      # matches, more false positives) or missing fixtures fails this job.
      - name: Run parity tests
        run: cargo test --test parity -- --include-ignored

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny (advisories, licenses, bans, sources)
        run: cargo deny check

  wheel-smoke:
    name: Python wheel import smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin
        run: pip install maturin
      - name: Build and install the wheel
        # Bundled schemas are embedded via include_bytes!, so no schema
        # download is required to build or import the wheel.
        run: |
          maturin build --out dist
          pip install --no-index --find-links dist cfn-lint
      - name: Import smoke test
        # Fails the build if the wheel is broken at import time (missing
        # exports, wrong module init symbol) or if a trivial lint call panics.
        run: python scripts/smoke_test.py
