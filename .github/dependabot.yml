version: 2
updates:
  # Keep SHA-pinned GitHub Actions fresh (C84). Dependabot bumps the pinned
  # commit SHA and updates the trailing `# vX.Y.Z` version comment.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
