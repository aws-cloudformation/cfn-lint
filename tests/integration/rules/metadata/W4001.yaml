# --- cfn-lint-test ---
# rule: W4001
# description: Metadata Interface parameters must reference existing parameters
# expect:
#   - rule: W4001
#     path: /Metadata/AWS::CloudFormation::Interface/ParameterGroups
#     message_contains: "MissingParam"
#   - rule: W4001
#     path: /Metadata/AWS::CloudFormation::Interface/ParameterLabels
#     message_contains: "GhostParam"
# ---
Parameters:
  RealParam:
    Type: String

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Config
        Parameters:
          - RealParam
          - MissingParam
    ParameterLabels:
      RealParam:
        default: A real parameter
      GhostParam:
        default: Does not exist

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref RealParam
