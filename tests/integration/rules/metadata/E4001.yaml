# --- cfn-lint-test ---
# rule: E4001
# description: Metadata Interface properties validation
# expect:
#   - rule: E4001
#     path: /Metadata/AWS::CloudFormation::Interface
#     message_contains: "Additional properties are not allowed"
#     message_contains_value: "InvalidKey"
# ---
Parameters:
  MyParam:
    Type: String

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Configuration
        Parameters:
          - MyParam
    ParameterLabels:
      MyParam:
        default: My Parameter
    InvalidKey: should-not-be-here

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref MyParam
