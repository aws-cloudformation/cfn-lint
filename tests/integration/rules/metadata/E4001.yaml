# --- cfn-lint-test ---
# rule: E4001
# description: Metadata Interface properties validation
# expect: []
# ---
# NOTE: Rule E4001 Metadata Interface validation not yet implemented in v2 engine
Parameters:
  MyParam:
    Type: String

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Configuration
        Parameters:
          - MyParam
    ParameterLabels:
      MyParam:
        default: My Parameter
    InvalidKey: should-not-be-here

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref MyParam
