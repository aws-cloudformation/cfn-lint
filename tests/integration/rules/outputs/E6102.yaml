# --- cfn-lint-test ---
# rule: E6102
# description: Output export names must be strings
# expect:
#   - rule: E6102
#     path: /Outputs/BadExport/Export/Name
#     message_contains: "is not of type"
# ---
AWSTemplateFormatVersion: "2010-09-09"
Resources:
  Bucket:
    Type: AWS::S3::Bucket
Outputs:
  GoodExport:
    Value: some-value
    Export:
      Name: my-export-name

  GoodSubExport:
    Value: some-value
    Export:
      Name: !Sub "${AWS::StackName}-export"

  BadExport:
    Value: some-value
    Export:
      Name:
        - not-a-string
