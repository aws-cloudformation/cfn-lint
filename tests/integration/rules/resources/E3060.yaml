# --- cfn-lint-test ---
# rule: E3060
# description: Validate subnet CIDRs do not overlap within the same VPC
# expect:
#   - rule: E3060
#     path: /Resources/OverlappingSubnet/Properties
#     message_contains: "overlaps"
# ---
Resources:
  MyVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"

  GoodSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVpc
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: us-east-1a

  GoodSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVpc
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: us-east-1b

  BaseSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVpc
      CidrBlock: "10.0.3.0/24"
      AvailabilityZone: us-east-1a

  OverlappingSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVpc
      CidrBlock: "10.0.3.128/25"
      AvailabilityZone: us-east-1b
