# --- cfn-lint-test ---
# rule: E3027
# description: Validate AWS Event ScheduleExpression format
# expect:
#   - rule: E3027
#     path: /Resources/BadNotRateOrCron/Properties/ScheduleExpression
#     message_contains: "cron()"
#   - rule: E3027
#     path: /Resources/BadRatePluralUnit/Properties/ScheduleExpression
#     message_contains: "not one of"
#   - rule: E3027
#     path: /Resources/BadCronBothDays/Properties/ScheduleExpression
#     message_contains: "Day-of-month"
# ---
Resources:
  GoodRate:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: "rate(5 minutes)"
      State: ENABLED
      Targets:
        - Arn: arn:aws:lambda:us-east-1:123456789012:function:my-func
          Id: Target1

  GoodRateSingular:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: "rate(1 hour)"
      State: ENABLED
      Targets:
        - Arn: arn:aws:lambda:us-east-1:123456789012:function:my-func
          Id: Target1

  GoodCron:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: "cron(0 12 * * ? 2025)"
      State: ENABLED
      Targets:
        - Arn: arn:aws:lambda:us-east-1:123456789012:function:my-func
          Id: Target1

  BadNotRateOrCron:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: "every 5 minutes"
      State: ENABLED
      Targets:
        - Arn: arn:aws:lambda:us-east-1:123456789012:function:my-func
          Id: Target1

  BadRatePluralUnit:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: "rate(1 minutes)"
      State: ENABLED
      Targets:
        - Arn: arn:aws:lambda:us-east-1:123456789012:function:my-func
          Id: Target1

  BadCronBothDays:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: "cron(0 12 15 * MON 2025)"
      State: ENABLED
      Targets:
        - Arn: arn:aws:lambda:us-east-1:123456789012:function:my-func
          Id: Target1
