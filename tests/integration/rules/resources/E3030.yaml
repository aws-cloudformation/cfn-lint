Resources:
  GoodBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private

  GoodBucketRef:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: !Ref "AWS::NoValue"

  BadAccessControl:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: InvalidAccess
