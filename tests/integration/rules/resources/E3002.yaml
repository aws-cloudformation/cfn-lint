Resources:
  GoodQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: valid-queue
      DelaySeconds: 5

  BadSingleExtra:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: my-queue
      FakeProp: not-real

  BadMultipleExtra:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-bucket
      Bogus1: aaa
      Bogus2: bbb
