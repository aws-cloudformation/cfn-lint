# --- cfn-lint-test ---
# rule: E3028
# description: Resource Metadata section must be an object or array with no null values
# expect:
#   - rule: E3028
#     path: /Resources/BadMetadataNull/Metadata/NullValue
#     message_contains: "is not of type"
# ---
Resources:
  GoodMetadata:
    Type: AWS::S3::Bucket
    Metadata:
      CustomKey: some-value
      NestedObject:
        Key: value
    Properties:
      BucketName: good-metadata

  GoodMetadataInit:
    Type: AWS::EC2::Instance
    Metadata:
      AWS::CloudFormation::Init:
        config:
          packages:
            yum:
              httpd: []
    Properties:
      ImageId: ami-12345678
      InstanceType: t2.micro

  BadMetadataNull:
    Type: AWS::S3::Bucket
    Metadata:
      NullValue: null
    Properties:
      BucketName: bad-metadata
