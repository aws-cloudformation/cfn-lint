# --- cfn-lint-test ---
# rule: E3706
# description: AutoScaling MaxSize must be >= MinSize
# expect:
#   - rule: E3706
#     path: /Resources/BadMaxLessThanMin/Properties/this/MaxSize
#     message_contains: "is less than the minimum"
# ---
Resources:
  GoodMaxGreaterThanMin:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: "1"
      MaxSize: "10"
      LaunchTemplate:
        LaunchTemplateId: lt-12345
        Version: "1"

  GoodMaxEqualsMin:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: "5"
      MaxSize: "5"
      LaunchTemplate:
        LaunchTemplateId: lt-12345
        Version: "1"

  GoodRefParameter:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: !Ref MinParam
      MaxSize: "10"
      LaunchTemplate:
        LaunchTemplateId: lt-12345
        Version: "1"

  BadMaxLessThanMin:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: "5"
      MaxSize: "2"
      LaunchTemplate:
        LaunchTemplateId: lt-12345
        Version: "1"
