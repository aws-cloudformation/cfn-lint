# --- cfn-lint-test ---
# rule: W2506
# description: Check if ImageId Parameters have the correct type
# expect: []
# ---
# NOTE: Rule W2506 ImageId parameter type check not yet implemented in v2 engine
Parameters:
  GoodImageId:
    Type: AWS::EC2::Image::Id

  GoodSsmImageId:
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"

  BadImageId:
    Type: String

Resources:
  GoodInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref GoodImageId
      InstanceType: t3.micro

  GoodSsmInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref GoodSsmImageId
      InstanceType: t3.micro

  BadInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref BadImageId
      InstanceType: t3.micro
