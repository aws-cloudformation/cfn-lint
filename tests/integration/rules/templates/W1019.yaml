# --- cfn-lint-test ---
# rule: W1019
# description: Fn::Sub parameters should be used
# expect:
#   - rule: W1019
#     path: /Resources/BadUnusedParam/Properties/BucketName
#     message_contains: "UnusedKey"
# ---
Resources:
  GoodSubWithAllUsed:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub
        - "${Domain}-${Env}-bucket"
        - Domain: example.com
          Env: prod

  BadUnusedParam:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub
        - "${Domain}-bucket"
        - Domain: example.com
          UnusedKey: this-is-never-referenced
